<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enklav</title>

    <link rel="stylesheet" href="style.css">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
        }

        body {
            overflow-x: hidden;
        }

        /* Estilos recomendados para o Smooth Scroll */
        html.lenis,
        html.lenis body {
            height: auto;
        }

        .lenis.lenis-smooth {
            scroll-behavior: auto;
        }

        .lenis.lenis-stopped {
            overflow: hidden;
        }

        .back-button {
            position: fixed;
            top: clamp(16px, 3vw, 30px);
            left: clamp(18px, 4vw, 40px);
            z-index: 100;
            width: clamp(72px, 9vw, 130px);
            height: clamp(72px, 9vw, 130px);
            display: block;
            cursor: pointer;
        }

        #logo-container {
            width: 100%;
            height: 100%;
        }

        .enklav-intro-video {
            width: 100%;
            height: 100dvh;
            display: block;
            object-fit: cover;
            pointer-events: none;
            background-color: #000000;
        }

        .video-1 {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .video-2 {
            position: relative;
            z-index: 2;
            background-color: #000000;
        }

        .video-wrapper {
            position: relative;
            height: 300dvh;
            background-color: #000000;
        }

        .video-3-wrapper {
            z-index: 3;
        }

        .video-4-wrapper {
            z-index: 4;
            margin-top: -100dvh;
        }

        .video-5-wrapper {
            z-index: 5;
            margin-top: -100dvh;
        }

        .sticky-video {
            position: sticky;
            top: 0;
        }

        @media (max-width: 900px) {
            .back-button {
                width: 72px;
                height: 72px;
            }

            .video-wrapper {
                height: 250dvh;
            }

            .video-4-wrapper,
            .video-5-wrapper {
                margin-top: -100dvh;
            }
        }
    </style>
</head>

<body>
    <!-- Botão de voltar com o logo 3D -->
    <a href="work.html" class="back-button">
        <div id="logo-container" data-color="#ffffff"></div>
    </a>

    <!-- Primeiro Vídeo full screen -->
    <video src="Elements/Enklav port 1.mp4" class="enklav-intro-video video-1" autoplay muted playsinline></video>
    
    <!-- Segundo Vídeo full screen -->
    <video id="video-2" src="Elements/Enklav port 2.mp4" class="enklav-intro-video video-2" muted playsinline></video>

    <!-- Terceiro Vídeo full screen -->
    <div id="video-3-wrapper" class="video-wrapper video-3-wrapper">
        <video id="video-3" src="Elements/enklav port 3.mp4" class="enklav-intro-video sticky-video" preload="auto" muted playsinline loop></video>
    </div>

    <!-- Quarto Vídeo full screen -->
    <div id="video-4-wrapper" class="video-wrapper video-4-wrapper">
        <video id="video-4" src="Elements/Enklav port 4.mp4" class="enklav-intro-video sticky-video" preload="auto" muted playsinline></video>
    </div>

    <!-- Quinto Vídeo full screen -->
    <div id="video-5-wrapper" class="video-wrapper video-5-wrapper">
        <video id="video-5" src="Elements/Enklav port 5.mp4" class="enklav-intro-video sticky-video" preload="auto" muted playsinline loop></video>
    </div>

    <!-- Script do Three.js e do botão 3D -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>

    <script type="module" src="corrodit.js"></script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <script>
        const lenis = new Lenis({
            duration: 1.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
            smoothWheel: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }

        requestAnimationFrame(raf);
    </script>

    <script>
        const scrollVideos = [
            document.getElementById('video-3'),
            document.getElementById('video-4'),
            document.getElementById('video-5')
        ];

        const video2 = document.getElementById('video-2');
        let isVideo2Finished = false;
        let isVideo2Playing = false;

        video2.addEventListener('ended', () => {
            isVideo2Finished = true;
            lenis.start();
        });

        const video4Wrapper = document.getElementById('video-4-wrapper');
        const video4 = document.getElementById('video-4');
        let isVideo4Finished = false;
        let isVideo4Playing = false;

        video4.addEventListener('ended', () => {
            isVideo4Finished = true;
            lenis.start();
        });

        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.play().catch(() => {});
                } else {
                    entry.target.pause();
                }
            });
        }, { threshold: 0.95 });

        scrollVideos.forEach(v => {
            if (v) {
                videoObserver.observe(v);
            }
        });

        let resetScrollTimeout;

        lenis.on('scroll', (e) => {
            if (!isVideo2Finished && window.scrollY >= video2.offsetTop) {
                if (window.scrollY > video2.offsetTop) {
                    lenis.scrollTo(video2.offsetTop, { immediate: true });
                }
                
                if (!isVideo2Playing) {
                    lenis.stop(); 
                    video2.play().catch(() => {});
                    isVideo2Playing = true;
                }

                return;
            }

            if (isVideo2Finished && !isVideo4Finished && window.scrollY >= video4Wrapper.offsetTop) {
                if (window.scrollY > video4Wrapper.offsetTop) {
                    lenis.scrollTo(video4Wrapper.offsetTop, { immediate: true });
                }
                
                if (!isVideo4Playing) {
                    lenis.stop(); 
                    video4.play().catch(() => {});
                    isVideo4Playing = true;
                }

                return;
            }

            const velocity = e.velocity || 0;
            
            if (Math.abs(velocity) > 0) {
                scrollVideos.forEach(v => {
                    if (v && !isNaN(v.duration)) {
                        if (velocity > 0) {
                            if (v.paused) v.play().catch(() => {});
                            v.playbackRate = Math.min(4.0, 1 + velocity * 0.05);
                        } else {
                            if (!v.paused) v.pause();
                            v.currentTime += velocity * 0.015;
                        }
                    }
                });
                
                clearTimeout(resetScrollTimeout);

                resetScrollTimeout = setTimeout(() => {
                    scrollVideos.forEach(v => {
                        if (v) {
                            v.playbackRate = 1.0;
                            const rect = v.getBoundingClientRect();

                            if (v.paused && rect.top <= window.innerHeight && rect.bottom >= 0) {
                                v.play().catch(() => {});
                            }
                        }
                    });
                }, 150);
            }
        });
    </script>
</body>
</html>
