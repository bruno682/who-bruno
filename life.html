<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life - Interactive Canvas</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .back-button {
            position: fixed;
            top: clamp(12px, 2vw, 24px);
            left: clamp(12px, 2vw, 24px);
            z-index: 100;
            width: clamp(72px, 9vw, 130px);
            height: clamp(72px, 9vw, 130px);
            display: block;
            cursor: pointer;
        }

        #logo-container {
            width: 100%;
            height: 100%;
        }

        #canvas-container {
            width: 100dvw;
            height: 100dvh;
        }

        .work-preview {
            width: 100%;
            height: 80%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', Arial, sans-serif;
            font-size: clamp(2rem, 4vw, 3rem);
            text-align: center;
        }

        .preview-dark {
            background-color: #000000;
            color: #ffffff;
        }

        .preview-light {
            background-color: #ffffff;
            color: #000000;
        }

        .preview-split {
            width: 100%;
            height: 80%;
            display: flex;
        }

        .preview-split-dark {
            flex: 1;
            background-color: #1b1b1b;
        }

        .preview-split-yellow {
            flex: 1;
            background-color: #FFD700;
        }

        .preview-green {
            width: 100%;
            height: 80%;
            background-color: #4CAF50;
        }

        .canvas-instruction {
            font-size: clamp(0.8rem, 1.2vw, 1.2rem);
        }

        .carousel-container {
            width: min(90dvw, 1400px);
            height: 90dvh;
        }

        .carousel-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        @media (max-width: 900px) {
            .back-button {
                width: 72px;
                height: 72px;
            }

            .work-item {
    width: clamp(220px, 28vw, 420px);
    height: clamp(220px, 28vw, 420px);
}

            .work-preview {
                font-size: clamp(1.8rem, 8vw, 2.5rem);
            }

            .canvas-instruction {
                bottom: 24px;
                width: calc(100% - 48px);
                text-align: center;
            }
        }
    </style>
</head>

<body class="life-page">
    
    <!-- Botão de Voltar -->
    <a href="menu.html" class="back-button">
        <div id="logo-container" data-color="#ffffff"></div>
    </a>

    <div class="canvas-instruction">Click and drag to explore</div>

    <div id="canvas-container">
        <div id="world">
            <!-- Cartões de Projetos Espalhados -->
            <a href="world.html" class="work-item" style="left: -400px; top: -200px;">
                <div class="work-preview preview-dark">
                    Keep moving
                </div>
                <h3>World</h3>
            </a>

            <a href="#" class="work-item yellow-black-item" style="left: 0px; top: 0px;">
                <div class="preview-split">
                    <div class="preview-split-dark"></div>
                    <div class="preview-split-yellow"></div>
                </div>
                <h3>Black & Yellow</h3>
            </a>

            <a href="#" class="work-item green-item" style="left: 0px; top: 400px;">
                <div class="preview-green"></div>
                <h3>Green</h3>
            </a>

            <a href="draw.html" class="work-item" style="left: 0px; top: -400px;">
                <div class="work-preview preview-light">
                    Draw me
                </div>
                <h3>Draw me</h3>
            </a>

            <a href="#" class="work-item bubble-item" style="left: -400px; top: 200px;">
                <img src="Life/Bubble fundo.png" alt="Bubbles">
                <h3>Bubbles</h3>
            </a>

            <a href="#" class="work-item rolex-item" style="left: 400px; top: -200px;">
                <img src="Life/Rolex orange 2.png" alt="Rolex">
                <h3>Watch</h3>
            </a>
        </div>
    </div>

    <!-- Overlay de Vídeo para Bubbles -->
    <div id="video-overlay" class="video-overlay">
        <video id="overlay-video" src="Life/bubbles.mp4" controls playsinline></video>
        <div class="close-overlay">✕</div>
    </div>

    <!-- Overlay de Vídeo para Rolex -->
    <div id="rolex-overlay" class="video-overlay">
        <video id="rolex-video" src="Life/Rolex animation.mp4" controls playsinline></video>
        <div class="close-overlay" id="close-rolex">✕</div>
    </div>

    <!-- Overlay de Carrossel para Green Work -->
    <div id="green-overlay" class="video-overlay">
        <div class="carousel-container">
            <button id="carousel-prev" class="carousel-btn">&#10094;</button>

            <div class="carousel-track">
                <img src="Life/IMG_8496.png" alt="Green 1" class="carousel-img active">
                <img src="Life/IMG_8512.png" alt="Green 2" class="carousel-img">
                <img src="Life/IMG_8530.png" alt="Green 4" class="carousel-img">
                <img src="Life/IMG_8532.png" alt="Green 5" class="carousel-img">
                <img src="Life/IMG_8528.png" alt="Green 6" class="carousel-img">
            </div>

            <button id="carousel-next" class="carousel-btn">&#10095;</button>
        </div>

        <div class="close-overlay" id="close-green">✕</div>
    </div>

    <!-- Overlay de Carrossel para Yellow and Black -->
    <div id="yb-overlay" class="video-overlay">
        <div class="carousel-container">
            <button id="yb-prev" class="carousel-btn">&#10094;</button>

            <div class="carousel-track">
                <img src="Life/IMG_8683.png" alt="Yellow and Black 1" class="carousel-img active">
                <img src="Life/IMG_8552.png" alt="Yellow and Black 2" class="carousel-img">
                <img src="Life/IMG_8604.png" alt="Yellow and Black 3" class="carousel-img">
                <img src="Life/IMG_8747.png" alt="Yellow and Black 4" class="carousel-img">
                <img src="Life/IMG_8768.png" alt="Yellow and Black 5" class="carousel-img">
                <img src="Life/IMG_8781.png" alt="Yellow and Black 6" class="carousel-img">
            </div>

            <button id="yb-next" class="carousel-btn">&#10095;</button>
        </div>

        <div class="close-overlay" id="close-yb">✕</div>
    </div>

    <!-- Import map para o Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>

    <script src="life.js"></script>
    <script type="module" src="corrodit.js"></script>
</body>
</html>
