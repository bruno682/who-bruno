<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Pixelify+Sans:wght@400..700&family=Rubik+Glitch&display=swap" rel="stylesheet">

    <!-- Importa a biblioteca p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    
    <style>
        body {
            font-family: "Inter", sans-serif;
            margin: 0;
            display: grid;
            grid-template-columns: minmax(280px, 50%) 1fr;
            align-content: start;
            min-height: 100dvh;
            background-color: #ffffff;
            padding: clamp(24px, 5vw, 80px);
            box-sizing: border-box;
            gap: clamp(32px, 5vw, 80px);
        }

        /* Botão de voltar */
        .back-button {
            position: fixed;
            top: clamp(20px, 3vw, 30px);
            left: clamp(24px, 4vw, 40px);
            z-index: 100;
            width: clamp(64px, 9vw, 130px);
            height: clamp(64px, 9vw, 130px);
            display: block;
            cursor: pointer;
        }

        #logo-container {
            width: 100%;
            height: 100%;
        }

        /* 2. O container da direita */
        .right-content {
            order: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: min(50vw, 720px);
        }

        /* Aplica apenas ao canvas do p5.js para não afetar o botão 3D */
        canvas.p5Canvas {
            order: 1;
            width: min(50vw, 720px) !important;
            max-width: 100% !important;
            height: auto !important;
            margin: 0 !important;
            display: block;
        }

        .top-texts h1 {
            margin: 0;
            line-height: 0.85;
            font-size: clamp(4rem, 11vw, 12rem);
            font-weight: 800;
        }

        .bottom-phrase {
            margin: 0;
            text-align: right;
            align-self: flex-end;
            max-width: min(400px, 100%);
            font-size: clamp(1.2rem, 2vw, 1.9rem);
            font-weight: 600;
        }

        .blink-text {
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .bottom-section {
            order: 3;
            grid-column: 1 / -1;
            display: flex;
            flex-direction: row;
            gap: clamp(48px, 18vw, 320px);
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            margin-top: clamp(40px, 6vw, 80px);
            font-size: clamp(1rem, 2vw, 2rem);
        }

        .bottom-section a {
            text-decoration: none;
            color: #000000;
            transition: transform 0.3s ease;
        }

        .bottom-section a:hover {
            transform: scale(1.05);
        }

        #hover-image {
            position: fixed;
            top: 0;
            left: 0;
            width: clamp(180px, 22vw, 300px);
            height: clamp(240px, 30vw, 400px);
            background-size: cover;
            background-position: center;
            pointer-events: none;
            opacity: 0;
            z-index: 9999;
            transform: translate(-50%, 15px);
            transition: opacity 0.3s ease;
        }

        @media (max-width: 900px) {
            body {
                grid-template-columns: 1fr;
                gap: 32px;
                padding: 24px;
                padding-top: 110px;
            }

            .right-content {
                order: 1;
                min-height: auto;
                gap: 32px;
            }

            canvas.p5Canvas {
                order: 2;
                width: 100% !important;
                max-width: 640px !important;
                justify-self: center;
            }

            .top-texts h1 {
                font-size: clamp(4rem, 20vw, 8rem);
            }

            .bottom-phrase {
                text-align: left;
                align-self: flex-start;
            }

            .bottom-section {
                min-height: 70dvh;
                gap: 48px;
                justify-content: flex-start;
                font-size: clamp(1rem, 5vw, 2rem);
            }
        }
    </style>
</head>

<body>
    <!-- Botão de Voltar 3D -->
    <a href="menu.html" class="back-button">
        <div id="logo-container" data-color="#222222"></div>
    </a>

    <div class="right-content">
        <div class="top-texts">
            <h1>ABOUT</h1>
            <h1 class="blink-text">WHO?</h1>
        </div>
        
        <h2 class="bottom-phrase">If I don't know who I am, I will let the ones that know talk</h2>
    </div>

    <script src="about.js"></script>
    
    <div class="bottom-section">
        <a href="family.html" class="Family">
            <h1>Family</h1>
        </a>

        <a href="ai.html" class="AI">
            <h1>AI</h1>
        </a>
    </div>

    <!-- Elemento da imagem que segue o mouse -->
    <div id="hover-image"></div>

    <!-- Import map para o Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>

    <script type="module" src="corrodit.js"></script>

    <script>
        const hoverImg = document.getElementById('hover-image');
        const bottomLinks = document.querySelectorAll('.bottom-section a');
        
        const imagensHover = {
            'Family': 'Elements/IMG_9237.jpg', 
            'Friends': 'Elements/imagem-friends.jpg',
            'AI': 'Imagens/Foto IA.png'
        };

        bottomLinks.forEach(link => {
            link.addEventListener('mouseenter', () => {
                const classeLink = link.getAttribute('class');
                if (imagensHover[classeLink]) {
                    hoverImg.style.backgroundImage = `url('${imagensHover[classeLink]}')`;
                    hoverImg.style.opacity = '1';
                }
            });

            link.addEventListener('mousemove', (e) => {
                hoverImg.style.left = `${e.clientX}px`;
                hoverImg.style.top = `${e.clientY}px`;
            });

            link.addEventListener('mouseleave', () => {
                hoverImg.style.opacity = '0';
            });
        });
    </script>
</body>
</html>
