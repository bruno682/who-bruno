<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EID - Menu</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .menu-back-button {
            position: absolute;
            top: clamp(-10px, -1vw, 0px);
            left: clamp(-10px, -1vw, 0px);
            z-index: 100;
            width: clamp(72px, 9vw, 130px);
            height: clamp(72px, 9vw, 130px);
            display: block;
            cursor: pointer;
        }

        #logo-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body class="menu-page">
    <div id="cursor-customizado"></div>

    <div class="menu-wrapper">
        <div class="menu-content">

            <!-- Botão de Voltar 3D -->
            <a href="index.html" class="menu-back-button">
                <div id="logo-container"></div>
            </a>

            <nav class="menu-grid-layout">
                <a href="about.html" class="item about">ABOUT</a>
                <a href="work.html" class="item work">WORK</a>
                <a href="life.html" class="item life">LIFE</a>
                <a href="contact.html" class="item contact">
                    <span class="contact-inner">CONTACT</span>
                </a>
            </nav>

        </div>
    </div>

    <script type="module" src="script.js"></script>
    
    <!-- Import map para o Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>

    <script type="module" src="corrodit.js"></script>
</body>
</html>
