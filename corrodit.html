<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrodit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="scrollable-page" style="background-color: #ffffff;">
    <!-- Fundo em tela cheia -->
    <div style="position: relative; width: 100vw; height: 100vh; overflow: hidden;">
        <img src="Elements/Corrodit fundo 1.png" alt="Corrodit Fundo" style="width: 100%; height: 100%; object-fit: cover;">
    </div>

    <!-- Seção de Conteúdo (Scroll) -->
    <div style="position: relative; z-index: 10; display: flex; flex-direction: column; justify-content: center; padding-top: 100px;">
        <p class="about-text" style="max-width: 900px; margin-left: 70px; text-align: left; margin-top: 25vh; margin-bottom: 100px; color: #000000;">
            Transform a problem that exist for centuries in a form of identity, a object that transcend the three dimensions and change thought time.
        </p>
        <img id="corrodit-parque" src="Elements/Corrodit parque.png" alt="Corrodit Parque" style="width: 100%; height: auto; display: block; position: relative; z-index: 1;">

        <!-- Wrapper do Carrossel para o Scroll Vertical -->
        <div id="carousel-wrapper" style="position: relative; z-index: 3; height: 400vh; width: 100%;">
            <div style="position: sticky; top: 0; height: 100vh; width: 100%; overflow: hidden; display: flex; align-items: center; background-color: transparent;">
                <img id="carousel-bg" src="Elements/IMG_3710 1.png" alt="Corrodit IMG 3710" style="position: absolute; top: 0; left: 0; width: 100%; height: 100vh; object-fit: cover; z-index: 0; display: block; transition: filter 0.1s ease-out;">
                <div id="carousel-track" style="position: relative; z-index: 1; display: flex; gap: 40px; padding: 0 10vw 0 100vw; will-change: transform;">
                    <img src="Elements/Corrodit 3.png" alt="Corrodit 3" style="width: 80vw; max-height: 80vh; object-fit: contain; flex-shrink: 0; display: block;">
                    <img src="Elements/Corrodit 4.png" alt="Corrodit 4" style="width: 80vw; max-height: 80vh; object-fit: contain; flex-shrink: 0; display: block;">
                    <img src="Elements/Corrodit 5.png" alt="Corrodit 5" style="width: 80vw; max-height: 80vh; object-fit: contain; flex-shrink: 0; display: block;">
                    <img src="Elements/Corrodit 6.png" alt="Corrodit 6" style="width: 80vw; max-height: 80vh; object-fit: contain; flex-shrink: 0; display: block;">
                </div>
            </div>
        </div>
    </div>

    <!-- SVG no canto superior direito -->
    <img id="corrodit-logo" src="Elements/CORRODIT.svg" alt="Corrodit Logo" style="position: fixed; top: 0; right: 0px; width: 89vw; z-index: 50;">

    <!-- Botão de voltar com o logo 3D -->
    <a href="menu.html" style="position: fixed; top: 0; left: 0; z-index: 100; width: 10vw; height: 10vw; display: block; cursor: pointer;">
        <div id="logo-container" data-color="#222222" style="width: 100%; height: 100%;"></div>
    </a>

    <!-- Import map para o Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>
    <script type="module" src="corrodit.js"></script>
    
    <!-- Script para o efeito Parallax do Logo SVG e da Imagem -->
    <script>
        const corroditLogo = document.getElementById('corrodit-logo');
        const corroditParque = document.getElementById('corrodit-parque');
        const carouselWrapper = document.getElementById('carousel-wrapper');
        const carouselTrack = document.getElementById('carousel-track');
        const carouselBg = document.getElementById('carousel-bg');

        window.addEventListener('scroll', () => {
            // Move o logo para cima com 50% da velocidade do scroll natural
            corroditLogo.style.transform = `translateY(-${window.scrollY * 0.67}px)`;
            
            // Subtrai a altura da primeira tela para que a imagem não seja empurrada antes de aparecer
            let scrollPassado = window.scrollY - window.innerHeight;
            if (scrollPassado < 0) scrollPassado = 0;
            
            // Empurra a imagem levemente para baixo apenas a partir do momento em que chegamos na seção
            corroditParque.style.transform = `translateY(${scrollPassado * 0.15}px)`;
            
            // --- Efeito do Carrossel (Scroll Vertical convertendo para Horizontal) ---
            if (carouselWrapper && carouselTrack) {
                const rect = carouselWrapper.getBoundingClientRect();
                const viewportHeight = window.innerHeight;
                const scrollableHeight = rect.height - viewportHeight;
                
                if (rect.top <= 0 && rect.top >= -scrollableHeight) {
                    const progress = Math.abs(rect.top) / scrollableHeight;
                    const maxScroll = carouselTrack.scrollWidth - window.innerWidth;
                    carouselTrack.style.transform = `translateX(-${progress * maxScroll}px)`;
                    
                    // Escurece o fundo rapidamente (nos primeiros 20% do scroll do carrossel)
                    if (carouselBg) {
                        const darkProgress = Math.min(1, progress * 5); 
                        carouselBg.style.filter = `brightness(${1 - (0.7 * darkProgress)})`;
                    }
                } else if (rect.top > 0) {
                    carouselTrack.style.transform = `translateX(0px)`;
                    if (carouselBg) carouselBg.style.filter = `brightness(1)`;
                } else {
                    const maxScroll = carouselTrack.scrollWidth - window.innerWidth;
                    carouselTrack.style.transform = `translateX(-${maxScroll}px)`;
                    if (carouselBg) carouselBg.style.filter = `brightness(0.3)`;
                }
            }
        });
    </script>
</body>
</html>
