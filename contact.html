<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        .back-button {
            position: fixed;
            top: clamp(12px, 2vw, 24px);
            left: clamp(12px, 2vw, 24px);
            z-index: 100;
            width: clamp(72px, 10vw, 150px);
            height: clamp(72px, 10vw, 150px);
            display: block;
            cursor: pointer;
        }

        #logo-container {
            width: 100%;
            height: 100%;
        }

        #physics-bg {
            position: fixed;
            inset: 0;
            width: 100dvw;
            height: 100dvh;
            z-index: 1;
            pointer-events: none;
        }

        .contact-content {
            position: relative;
            z-index: 10;
            min-height: 100dvh;
            width: 100%;
            overflow: hidden;
        }

        .contact-message-container {
            position: absolute;
            top: clamp(120px, 22vh, 290px);
            left: clamp(24px, 6vw, 80px);
            max-width: min(42%, 680px);
            pointer-events: none;
        }

        .contact-message-title {
            font-family: Helvetica, Arial, sans-serif;
            font-size: clamp(3rem, 5vw, 6rem);
            font-weight: 700;
            line-height: 1;
            color: #000000;
            margin: 0;
        }

        .contact-card {
            position: absolute;
            right: 0;
            bottom: 0;
            width: min(56%, 980px);
            min-width: min(620px, 100%);
            min-height: min(70dvh, 760px);
            border-top: 1px solid #000;
            border-left: 1px solid #000;
            display: flex;
            gap: clamp(24px, 3vw, 48px);
            padding: clamp(28px, 4vw, 60px);
            background: rgba(255, 255, 255, 0.72);
            box-sizing: border-box;
            backdrop-filter: blur(4px);
        }

        .form-section {
            flex: 2;
        }

        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: clamp(32px, 5vh, 64px);
        }

        .input-group {
            margin-top: clamp(24px, 4vh, 40px);
        }

        .input-group label {
            display: block;
            font-size: clamp(1.6rem, 3vw, 3.2rem);
            margin-bottom: 10px;
            line-height: 1;
        }

        .input-group input,
        .input-group textarea {
            border: none;
            border-bottom: 2px solid #000;
            padding: 10px 0;
            width: 100%;
            outline: none;
            font-size: clamp(1.1rem, 2vw, 2rem);
            background: transparent;
            resize: none;
            font-family: inherit;
        }

        .submit-btn {
            background: #000;
            color: #fff;
            margin-top: clamp(48px, 9vh, 100px);
            padding: clamp(14px, 1.5vw, 20px) clamp(28px, 3vw, 45px);
            font-size: clamp(1.2rem, 2.2vw, 2.2rem);
            cursor: pointer;
            border: none;
            transition: opacity 0.3s, transform 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .info-item h3 {
            font-size: clamp(1.4rem, 2.4vw, 2.4rem);
            margin: 0 0 10px 0;
        }

        .info-item p {
            color: #555;
            font-size: clamp(1rem, 1.3vw, 1.2rem);
            margin: 0;
        }

        @media (max-width: 900px) {
            .contact-content {
                min-height: auto;
                overflow: visible;
                padding-top: 120px;
            }

            .contact-message-container {
                position: relative;
                top: auto;
                left: auto;
                max-width: none;
                padding: 24px;
            }

            .contact-card {
                position: relative;
                width: 100%;
                min-width: 0;
                min-height: auto;
                flex-direction: column;
                border-left: none;
                padding: 24px;
            }
        }
    </style>
</head>

<body class="contact-page">
    <a href="menu.html" class="back-button">
        <div id="logo-container" data-color="#222222"></div>
    </a>

    <!-- Contêiner do Fundo 3D caindo -->
    <div id="physics-bg"></div>

    <main class="contact-content">
        <div class="contact-message-container">
            <h1 class="contact-message-title">Make interactive design with only a message</h1>
        </div>

        <section class="contact-card">
            <div class="form-section">
                <form>
                    <div class="input-group">
                        <label for="name">Name</label>
                        <input id="name" type="text">
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input id="email" type="email">
                    </div>

                    <div class="input-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="1"></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Contact Us</button>
                </form>
            </div>

            <div class="info-section">
                <div class="info-item">
                    <h3>Contact</h3>
                    <p>eiddesign@hotmail.com</p>
                </div>

                <div class="info-item">
                    <h3>Based in</h3>
                    <p>Aveiro, Portugal</p>
                </div>

                <div class="social-icons"></div>
            </div>
        </section>
    </main>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module" src="script.js"></script>
    <script type="module" src="corrodit.js"></script>
    <script type="module" src="contact-bg.js"></script>
</body>
</html>
