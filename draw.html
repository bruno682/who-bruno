<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw - Who is Bruno?</title>

    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: Arial, Helvetica, sans-serif;
        }

        #draw-container { 
            width: 100dvw; 
            height: 100dvh; 
            cursor: grab; 
        }

        #draw-container:active { 
            cursor: grabbing; 
        }

        .back-button {
            position: fixed;
            top: clamp(16px, 3vw, 30px);
            left: clamp(18px, 4vw, 40px);
            z-index: 120;
            width: clamp(64px, 9vw, 130px);
            height: clamp(64px, 9vw, 130px);
            display: block;
            cursor: pointer;
        }

        #logo-container {
            width: 100%;
            height: 100%;
        }

        .tool-panel {
            position: fixed;
            top: 50%;
            left: clamp(18px, 3vw, 40px);
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: clamp(14px, 2.2vh, 30px);
            align-items: center;
        }

        .tool-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .tool-btn {
            padding: clamp(12px, 1.4vw, 20px) clamp(22px, 3vw, 40px);
            font-size: clamp(0.85rem, 1.2vw, 1.2rem);
            font-family: sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .tool-btn:hover {
            transform: scale(1.05);
        }

        .tool-btn.dark {
            background: #000;
            color: #fff;
            border: none;
        }

        .tool-btn.light {
            background: #fff;
            color: #000;
            border: 2px solid #000;
        }

        .tooltip {
            position: absolute;
            left: calc(100% + 20px);
            background: #ffffff;
            color: #000000;
            border: 2px solid #000;
            padding: 10px 15px;
            border-radius: 10px;
            font-family: sans-serif;
            font-size: clamp(0.75rem, 1vw, 0.9rem);
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: translateX(-10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #color-picker-btn {
            width: clamp(54px, 5vw, 70px);
            height: clamp(54px, 5vw, 70px);
            background-color: #000000;
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px #000, 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            padding: 0;
            border-radius: 50%;
            transition: transform 0.2s ease;
        }

        #color-picker-btn:hover {
            transform: scale(1.1);
        }

        #custom-color-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: clamp(100px, 12vw, 150px);
            transform: translateY(-50%);
            background: #ffffff;
            padding: clamp(18px, 2vw, 25px);
            border-radius: 20px;
            border: 2px solid #000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .popup-title {
            font-family: sans-serif;
            font-size: clamp(1rem, 1.4vw, 1.2rem);
            font-weight: bold;
            text-transform: uppercase;
            color: #000;
            letter-spacing: 1px;
        }

        .popup-actions {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        #eyedropper-btn {
            width: 45px;
            height: 45px;
            background: #fff;
            color: #000;
            border: 2px solid #000;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }

        #close-color-popup {
            flex: 1;
            padding: 10px 20px;
            font-size: 1rem;
            font-family: sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 50px;
        }

        #size-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            padding: clamp(18px, 2vw, 25px) clamp(12px, 1.5vw, 15px);
            border-radius: 50px;
            border: 2px solid #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .size-title {
            font-family: sans-serif;
            font-size: clamp(0.9rem, 1.4vw, 1.2rem);
            font-weight: bold;
            text-transform: uppercase;
            color: #000;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        #size-slider {
            cursor: pointer;
            height: clamp(90px, 13vh, 120px);
            width: 20px;
            margin: 10px 0;
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical;
        }

        #size-input {
            width: 45px;
            margin-top: 8px;
            text-align: center;
            font-family: sans-serif;
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            font-weight: bold;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            appearance: none;
            margin: 0; 
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        #brush-cursor {
            position: fixed;
            border: 1px solid #000;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 9999;
        }

        #undo-btn {
            padding: clamp(10px, 1.2vw, 15px) clamp(20px, 2.2vw, 30px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #undo-btn svg {
            width: clamp(24px, 3vw, 30px);
            height: auto;
        }

        @media (max-width: 800px) {
            .tool-panel {
                top: auto;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                flex-direction: row;
                gap: 10px;
                max-width: calc(100% - 32px);
                overflow-x: auto;
                padding: 8px;
            }

            .tool-btn {
                padding: 12px 20px;
                font-size: 0.8rem;
                white-space: nowrap;
            }

            #size-container {
                flex-direction: row;
                padding: 12px 16px;
                gap: 8px;
            }

            #size-slider {
                width: 90px;
                height: 20px;
                -webkit-appearance: auto;
                appearance: auto;
            }

            .tooltip,
            #shortcut-tooltip,
            #color-picker-tooltip,
            #eyedropper-tooltip,
            #size-tooltip,
            #undo-tooltip,
            #reset-tooltip,
            #save-tooltip {
                display: none;
            }

            #custom-color-popup {
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
            }

            .back-button {
                width: 72px;
                height: 72px;
            }
        }
    </style>
</head>

<body>

    <div id="brush-cursor"></div>

    <!-- Painel de ferramentas -->
    <div class="tool-panel">
        
        <div class="tool-wrap">
            <button id="paint-btn" class="tool-btn dark">Move</button>
            <div id="shortcut-tooltip" class="tooltip">Shortcut: M</div>
        </div>

        <div class="tool-wrap">
            <button id="color-picker-btn" title="Escolha uma cor"></button>
            <div id="color-picker-tooltip" class="tooltip">Shortcut: C</div>
        </div>

        <div id="custom-color-popup">
            <span class="popup-title">Color</span>
            <div id="color-wheel"></div>
            
            <div class="popup-actions">
                <div class="tool-wrap">
                    <button id="eyedropper-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m2 22 1-1h3l9-9"/>
                            <path d="M3 21v-3l9-9"/>
                            <path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/>
                        </svg>
                    </button>
                    <div id="eyedropper-tooltip" class="tooltip">Shortcut: I</div>
                </div>

                <button id="close-color-popup">Close</button>
            </div>
        </div>

        <div id="size-container">
            <span class="size-title">Size</span>
            <input type="range" id="size-slider" orient="vertical" min="0.01" max="0.2" step="0.01" value="0.06">
            <input type="number" id="size-input" min="1" max="20" value="6">
            <div id="size-tooltip" class="tooltip">Shortcut: 1 (-) / 2 (+)</div>
        </div>

        <div class="tool-wrap">
            <button id="undo-btn" class="tool-btn light">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="25" viewBox="0 0 190 158" fill="none">
                    <path d="M12.6816 43.5H127.432C156.565 43.5 180.182 67.117 180.182 96.25C180.182 125.383 156.565 149 127.432 149H86.1816M12.6816 43.5L46.6816 77.5M12.6816 43.5L46.6816 9" stroke="black" stroke-width="18" stroke-linecap="round"/>
                </svg>
            </button>
            <div id="undo-tooltip" class="tooltip">Shortcut: Ctrl+Z / ⌘Z</div>
        </div>

        <div class="tool-wrap">
            <button id="reset-btn" class="tool-btn light">Reset</button>
            <div id="reset-tooltip" class="tooltip">Shortcut: Del</div>
        </div>

        <div class="tool-wrap">
            <button id="save-btn" class="tool-btn light">Save</button>
            <div id="save-tooltip" class="tooltip">Shortcut: S</div>
        </div>
    </div>

    <!-- Botão de Voltar 3D -->
    <a href="life.html" class="back-button">
        <div id="logo-container" data-color="#222222"></div>
    </a>

    <!-- Container do modelo grande -->
    <div id="draw-container"></div>
