    <title>keep moving</title>

    <!-- p5.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
        font-family: 'Inter', Helvetica, Arial, sans-serif;
      }
      #hint {
  position: fixed;
  top: 80%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  opacity: 0.6;
  pointer-events: none;
  transition: opacity 0.4s ease;
  animation: circleMove 2s linear infinite;
}

@keyframes circleMove {
  0% { transform: translate(-50%, -50%) rotate(0deg) translate(20px) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg) translate(20px) rotate(-360deg); }
}
    </style>
