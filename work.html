<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who is Bruno?</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&family=Inter:wght@400;600;700&family=Pixelify+Sans:wght@400..700&family=Rubik+Glitch&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100dvh;
            overflow: hidden;
            background: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .back-button {
            position: fixed;
            top: clamp(12px, 2vw, 24px);
            left: clamp(12px, 2vw, 24px);
            z-index: 100;
            width: clamp(80px, 13vw, 250px);
            height: clamp(80px, 13vw, 250px);
            display: block;
            cursor: pointer;
        }

        #logo-container {
            width: 100%;
            height: 100%;
        }

        .title-work {
            position: absolute;
            top: clamp(40px, 7vw, 80px);
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.8rem, 3.4vw, 49px);
            font-weight: 600;
            margin: 0;
            z-index: 100;
            color: #000;
            line-height: 1;
            white-space: nowrap;
            text-align: center;
        }

        .model-label {
            position: absolute;
            color: #000000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(1rem, 1.5vw, 1.5rem);
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        
        .model-desc {
    position: fixed;
    top: 72%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(60%, 720px);
    display: flex;
    align-items: flex-start;
    gap: clamp(14px, 2vw, 24px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 20;
}

        .model-desc.active {
            opacity: 1;
        }

       .desc-image-placeholder,
.model-desc img {
    width: min(38vw, 380px);
    height: min(22vw, 280px);
    min-height: 160px;
    flex-shrink: 0;
    object-fit: cover;
}

        .desc-content {
    text-align: left;
    color: #000;
    flex: 1;
    min-width: 180px;
}


       body .model-desc h3,
body .desc-content h3 {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif !important;
    font-size: clamp(1.4rem, 2.4vw, 2.3rem);
    margin: -2px 0 8px 0;
    font-weight: 700;
    text-transform: uppercase;
    line-height: 0.9;
    letter-spacing: 1px;
}


      .desc-content p {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: clamp(0.85rem, 1.25vw, 1.25rem);
    line-height: 1.35;
    width: min(280px, 100%);
    margin: 0;
}

        @media (max-width: 900px) {
            body {
                overflow: auto;
            }

            .back-button {
                width: 72px;
                height: 72px;
            }

            .title-work {
                top: 32px;
                font-size: clamp(1.5rem, 6vw, 2.5rem);
            }

            .model-desc {
                top: auto;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                width: calc(100% - 32px);
                flex-direction: column;
                gap: 16px;
            }

            .desc-image-placeholder,
            .model-desc img {
                width: 100%;
                height: 260px;
                min-height: 0;
            }

            body .model-desc h3,
            body .desc-content h3 {
                font-size: clamp(2rem, 10vw, 3rem);
            }

            .desc-content p {
                font-size: clamp(1rem, 5vw, 1.4rem);
            }
        }
    </style>
</head>

<body>
    <!-- Botão de voltar com o logo 3D -->
    <a href="menu.html" class="back-button">
        <div id="logo-container" data-color="#222222"></div>
    </a>

    <h1 class="title-work">THATS MY WORK</h1>

    <!-- Import map necessário para o Three.js funcionar nativamente no navegador -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>
    
    <script type="module" src="corrodit.js"></script>
    <script type="module" src="script1.js"></script>
</body>
</html>
